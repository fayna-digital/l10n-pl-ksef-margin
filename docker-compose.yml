version: '3'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: postgres

  odoo:
    image: odoo:17
    depends_on:
      - db
    ports:
      - "8070:8069"
    volumes:
      - .:/mnt/extra-addons
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    command: >
      odoo
      --addons-path=/mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
      --db_host=db
      --db_user=odoo
      --db_password=odoo
